<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>MinhKha Cheat</title>

<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.menu{
background:#1e293b;
padding:25px;
border-radius:15px;
width:320px;
box-shadow:0 0 25px #000;
color:white;
}

.title{
text-align:center;
font-size:22px;
margin-bottom:20px;
font-weight:bold;
color:#38bdf8;
}

.box{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.slider{
width:100%;
}

.option{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

.switch{
position:relative;
display:inline-block;
width:50px;
height:24px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.sliderbtn{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#555;
transition:.3s;
border-radius:24px;
}

.sliderbtn:before{
position:absolute;
content:"";
height:18px;
width:18px;
left:3px;
bottom:3px;
background:white;
transition:.3s;
border-radius:50%;
}

input:checked + .sliderbtn{
background:#22c55e;
}

input:checked + .sliderbtn:before{
transform:translateX(26px);
}

.status{
font-size:13px;
margin-left:8px;
}

</style>
</head>

<body>

<div class="menu">

<div class="title">MinhKha Cheat</div>

<div class="box">

<input type="range" min="1" max="100" value="50" class="slider">

<div class="option">
<span>nhẹ tâm</span>

<div>
<label class="switch">
<input type="checkbox" onchange="toggle(this,'status1')">
<span class="sliderbtn"></span>
</label>
<span id="status1" class="status">❎️ đã tắt</span>
</div>

</div>

<div class="option">
<span>bám tâm</span>

<div>
<label class="switch">
<input type="checkbox" onchange="toggle(this,'status2')">
<span class="sliderbtn"></span>
</label>
<span id="status2" class="status">❎️ đã tắt</span>
</div>

</div>

</div>

</div>

<script>

function toggle(el,id){

let s=document.getElementById(id)

if(el.checked){
s.innerHTML="✅️ đã bật"
s.style.color="#22c55e"
}else{
s.innerHTML="❎️ đã tắt"
s.style.color="white"
}

}

</script>

</body>
</html>
